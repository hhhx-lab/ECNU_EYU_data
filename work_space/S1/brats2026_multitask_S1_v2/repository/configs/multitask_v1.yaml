seed: 42

data:

  train_split: /root/autodl-tmp/brats2026/data/splits/train_cases.txt

  val_split: /root/autodl-tmp/brats2026/data/splits/val_cases.txt

  data_root: /root/autodl-tmp/brats2026/data/sample50


model:

  in_channels: 4

  tumor_classes: 4

  rc_classes: 2


train:

  epochs: 3

  batch_size: 1

  lr: 0.0003

  num_workers: 4

  amp: true

  resume: "/root/autodl-tmp/brats2026/experiments/checkpoints/latest.pth"

  patch_size:
    - 96
    - 96
    - 96


checkpoint:

  save_dir: /root/autodl-tmp/brats2026/experiments/checkpoints

  save_every: 5


logging:

  tensorboard_dir: /root/autodl-tmp/brats2026/experiments/tensorboard


inference:

  output_dir: /root/autodl-tmp/brats2026/experiments/predictions

