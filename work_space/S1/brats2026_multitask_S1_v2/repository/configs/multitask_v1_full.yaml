seed: 42

data:

  train_split: /root/autodl-tmp/brats2026/data/splits/train_full.txt

  val_split: /root/autodl-tmp/brats2026/data/splits/val_full.txt

  data_root: /root/autodl-tmp/brats2026/data/extracted/MICCAI-LH-BraTS2025-MET-Challenge-Training

model:

  in_channels: 4

  tumor_classes: 4

  rc_classes: 2

