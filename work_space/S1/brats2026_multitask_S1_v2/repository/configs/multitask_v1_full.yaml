  num_workers: 8

  amp: true

  resume: /root/autodl-tmp/brats2026/experiments/checkpoints_full/latest.pth

  patch_size:
    - 96
    - 96
    - 96

checkpoint:

  save_dir: /root/autodl-tmp/brats2026/experiments/checkpoints_full

  save_every: 10

logging:

  tensorboard_dir: /root/autodl-tmp/brats2026/experiments/tensorboard_full

inference:

  output_dir: /root/autodl-tmp/brats2026/experiments/predictions_full
